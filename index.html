
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Boids Particle System A-Z</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <style>
    body { margin: 0; overflow: hidden; background: black; font-family: sans-serif; touch-action: none; }
    canvas { display: block; }

    #ui {
      position: absolute;
      top: 12px;
      left: 12px;
      z-index: 10;
    }
    #distortModeBtn {
      width: 48px;
      height: 48px;
      font-size: 24px;
      background: #111;
      color: white;
      border: 2px solid #555;
      border-radius: 50%;
      cursor: pointer;
      transition: box-shadow 0.3s, border-color 0.3s;
    }
    #distortModeBtn.active {
      box-shadow: 0 0 12px 3px #0ff;
      border-color: #0ff;
    }
  </style>
</head>
<body>
  <div id="ui">
    <button id="distortModeBtn">⭘</button>
  </div>
  <script type="module" src="main.js"></script>
</body>
</html>
